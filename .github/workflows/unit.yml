name: Unit Tests

on:
  pull_request:
  push:

jobs:
  unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev

      - name: Run formatting and vet checks
        run: |
          ./scripts/check.bash

      - name: Run Go tests
        run: |
          go test -count=1 ./...